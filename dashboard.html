<html>
<head>
    <title>Dashboard</title>

    <style>
        .hidden {
            display: none;
        }
        .student-card {
            border: 1px solid #ccc;
            padding: 12px;
            margin: 30px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            width: 500px;
        }
        input[type="text"],
        input[type="number"] {
        display: block;
        width: 300px;
        padding: 10px 14px;
        margin-bottom: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 0.95rem;
        outline: none;
    }

input:focus {
    border-color: #4f46e5;
}
        .actions button {
            margin-left: 5px;
        }
        .container {
            width: 60%;           /* control width */
            margin: 20px ;    /* center horizontally */
        }
        .body { font-family: sans-serif;
             max-width: 700px;
            margin: 30px ;
            padding: 0 20px;
            background: #f0f2f5; 
        }
        .input, select { 
            padding: 8px 12px;
            border-radius: 6px; 
            border: 1px solid #ccc; 
            width: 250px; 
        }
        .button { 
            padding: 8px 16px; 
            border-radius: 6px; 
            border: none; 
            background: #4f46e5; 
            color: white; 
            cursor: pointer; 
        }
        .button:hover { 
            background: #4338ca; 
        }
        .logout_button:hover { 
            background: #4338ca; 
        }
        .logout_button{ 
            padding: 8px 16px; 
            border-radius: 6px; 
            border: none; 
            background: #4f46e5; 
            color: white; 
            cursor: pointer; 
            margin-left: auto;
            display: blo
        }
    .student-card { 
        background: #ffffff; 
        border: none; 
        box-shadow: 0 1px 4px rgba(0,0,0,0.1); 
    }


    </style>
</head>
<body class="body">

<button class="logout_button" onclick="logout()">Logout</button>

<h2>Student Management Dashboard</h2>
<hr>

<input type="text" id="name" placeholder="Enter name"><br><br>
<input type="number" id="marks" placeholder="Enter marks"><br><br>

<select id="type" onchange="toggleDepartment()">
    <option value="student">Regular Student</option>
    <option value="graduate">Graduate Student</option>
</select><br><br>

<div id="deptContainer" style="display:none;">
    <label>Department:</label>
    <select id="department">
        <option value="Computer Science">Computer Science</option>
        <option value="Mechanical Engineering">Mechanical Engineering</option>
        <option value="Physics">Physics</option>
        <option value="Mathematics">Mathematics</option>
    </select>
</div>

<br>

<button class="button"  onclick="addStudent()">ADD STUDENT</button>
<button class="button"  onclick="clearAll()">CLEAR ALL</button>

<div class="container">
    <h3>Student List</h3>
    <p id="result"></p>
</div>

<script src="app.js"></script>
</body>
</html>
