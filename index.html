<html>
<head>
    <title>Login</title>
    <style>
.hidden {
            display: none;
        }
   * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}

h2 {
    color: #333;
    margin-bottom: 6px;
}

h3 {
    color: #555;
    margin-bottom: 20px;
}

input[type="text"],
input[type="password"] {
    display: block;
    width: 300px;
    padding: 10px 14px;
    margin-bottom: 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.95rem;
    outline: none;
}

input:focus {
    border-color: #4f46e5;
}

button {
    padding: 10px 20px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    margin-bottom: 12px;
}

button:hover {
    background: #4338ca;
}

a {
    color: #4f46e5;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

p {
    font-size: 0.88rem;
    color: #666;
    margin-bottom: 10px;
}

#authStatus {
    color: red;
    font-size: 0.85rem;
    margin-top: 10px;
}

.hidden {
    display: none;
}

.user-btn {
    background: white;
    color: #4f46e5;
    border: 1px solid #4f46e5;
    margin: 0 6px 8px 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
}

.user-btn:hover {
    background: #4f46e5;
    color: white;
}
</style>
</head>
<body>

<h2>WELCOME TO ABC INSTITUTIONS</h2>

<h3 id="authTitle">Login</h3>

<input type="text" id="username" placeholder="Username"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<div id="loginActions">
    <button onclick="handleLogin()">Login</button><br><br>
    <p>New user? <a href="#" onclick="toggleAuth(true)">Sign up</a></p>
</div>

<div id="signupActions" class="hidden">
    <button onclick="handleSignup()">Register</button><br><br>
    <p>Back to <a href="#" onclick="toggleAuth(false)">Login</a></p>
</div>

<p id="authStatus"></p>

<h3>REGISTRED USERS:</h3><br>
<div id="userList" ></div>

<script src="app.js"></script>
</body>
</html>
